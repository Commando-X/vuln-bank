services:
  web:
    build: .
    restart: unless-stopped
    ports:
      # Host port is overridable so macOS users can sidestep the port-5000
      # AirPlay Receiver conflict (Monterey+ reserves :5000 for Control
      # Center). Default is 5000 to keep existing Linux setups unchanged;
      # set WEB_PORT=8085 (or any free port) before `docker-compose up`
      # on macOS. See https://github.com/Commando-X/vuln-bank/issues/37.
      - "${WEB_PORT:-5000}:5000"
      - "80:5000"
      # - "443:5000"

    environment:
      - DB_NAME=vulnerable_bank
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db 
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./static/uploads:/app/static/uploads
    networks:
      - vuln_network

  db:
    image: postgres:13
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vulnerable_bank
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vuln_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vulnerable_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  vuln_network:
    driver: bridge
