<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Register - VulnBank</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon-16.svg') }}" sizes="16x16">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("vb-theme") || "light");</script>
</head>
<body class="auth-page">
    <a href="#merchantRegisterForm" class="skip-link">Skip to merchant registration</a>

    <div class="auth-brand">
        <div class="auth-brand-content">
            <div class="brand-logo">
                <div class="brand-logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"></rect><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path></svg>
                </div>
                <span class="brand-logo-text">VulnBank</span>
            </div>
            <h2>Merchant Console</h2>
            <p>Issue a plaintext API key for vulnerable checkout demos.</p>
            <div class="auth-trust-signals">
                <div class="auth-trust-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 7h3a5 5 0 0 1 0 10h-3"></path><path d="M9 17H6A5 5 0 0 1 6 7h3"></path><path d="M8 12h8"></path></svg>
                    API Keys
                </div>
                <div class="auth-trust-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"></path><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M7 15h.01"></path><path d="M11 15h2"></path></svg>
                    Card Charges
                </div>
            </div>
        </div>
    </div>

    <div class="auth-form-panel">
        <div class="auth-form-container">
            <h1>Create merchant</h1>
            <p class="auth-subtitle">Register a sandbox merchant account.</p>

            <div id="merchantAuthMessage"></div>

            <form id="merchantRegisterForm">
                <div class="auth-input-group">
                    <input type="text" name="name" id="name" placeholder="Merchant name" required aria-label="Merchant name">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path></svg>
                </div>
                <div class="auth-input-group">
                    <input type="email" name="email" id="email" placeholder="Email" required aria-label="Email">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"></path><path d="m22 6-10 7L2 6"></path></svg>
                </div>
                <div class="auth-input-group">
                    <input type="password" name="password" id="password" placeholder="Password" required aria-label="Password">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <button type="submit">Create Account</button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('merchant_login_page') }}">Already have a merchant account?</a>
                <br>
                <a href="{{ url_for('register') }}">Create personal banking account</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='merchant.js') }}"></script>
</body>
</html>
